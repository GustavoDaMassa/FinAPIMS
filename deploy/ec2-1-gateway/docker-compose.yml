services:
  gateway:
    build:
      context: ../..
      dockerfile: src/FinanceApi.Gateway/Dockerfile
    container_name: finance-gateway
    ports:
      - "8080:8080"
    environment:
      - Jwt__Secret=${JWT_SECRET}
      # Destinos internos via IP privado da VPC
      - ReverseProxy__Clusters__identity-cluster__Destinations__identity__Address=http://172.31.55.147:8080
      - ReverseProxy__Clusters__finance-cluster__Destinations__finance__Address=http://172.31.52.210:8080
      - ReverseProxy__Clusters__webhook-cluster__Destinations__webhook__Address=http://172.31.57.127:8080
      # Serilog console sink
      - Serilog__WriteTo__0__Name=Console
    restart: unless-stopped
