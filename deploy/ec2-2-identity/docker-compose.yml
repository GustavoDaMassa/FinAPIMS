services:
  postgres:
    image: postgres:15
    container_name: identity-postgres
    environment:
      POSTGRES_DB: financeapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  identity:
    build:
      context: ../..
      dockerfile: src/FinanceApi.Identity/Dockerfile
    container_name: finance-identity
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=financeapi;Username=postgres;Password=${DATABASE_PASSWORD};Search Path=identity
      - Jwt__Secret=${JWT_SECRET}
      - App__MasterKey=${MASTER_KEY}
      - Serilog__WriteTo__0__Name=Console
      - APP_INSTANCE=EC2-2 | IDENTITY | 172.31.55.147
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
