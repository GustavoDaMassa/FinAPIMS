services:
  webhook:
    image: gustavodamassa/finance-webhook:latest
    container_name: finance-webhook
    ports:
      - "8080:8080"
    environment:
      - Kafka__BootstrapServers=172.31.52.210:9092
      - Pluggy__ClientId=${PLUGGY_CLIENT_ID}
      - Pluggy__ClientSecret=${PLUGGY_CLIENT_SECRET}
      - Serilog__WriteTo__0__Name=Console
    restart: unless-stopped
