services:

  postgres:
    image: postgres:15
    container_name: finance-postgres
    environment:
      POSTGRES_DB: financeapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: finance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: finance-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  gateway:
    build:
      context: .
      dockerfile: src/FinanceApi.Gateway/Dockerfile
    container_name: finance-gateway
    ports:
      - "8080:8080"
    environment:
      - Jwt__Secret=${JWT_SECRET}
    depends_on:
      - identity-service
      - finance-service
      - webhook-service
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: src/FinanceApi.Identity/Dockerfile
    container_name: finance-identity
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=financeapi;Username=postgres;Password=${DATABASE_PASSWORD};Search Path=identity
      - Jwt__Secret=${JWT_SECRET}
      - App__MasterKey=${MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  finance-service:
    build:
      context: .
      dockerfile: src/FinanceApi.Finance/Dockerfile
    container_name: finance-core
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=financeapi;Username=postgres;Password=${DATABASE_PASSWORD};Search Path=finance
      - Jwt__Secret=${JWT_SECRET}
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  webhook-service:
    build:
      context: .
      dockerfile: src/FinanceApi.Webhook/Dockerfile
    container_name: finance-webhook
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - Pluggy__ClientId=${PLUGGY_CLIENT_ID}
      - Pluggy__ClientSecret=${PLUGGY_CLIENT_SECRET}
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
